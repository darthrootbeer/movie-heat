name: Weekly Movie Heat Newsletter

on:
  # Run every Thursday at 12:00 PM Eastern (17:00 UTC during DST, 16:00 UTC otherwise)
  # Using 17:00 UTC as a compromise (12:00 PM EST = 17:00 UTC, 12:00 PM EDT = 16:00 UTC)
  schedule:
    - cron: '0 17 * * 4'  # Thursday at 17:00 UTC

  # Allow manual triggering
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Movie Heat scraper and send email
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        SEND_EMAIL: 'true'
      run: python rt_scraper.py

    - name: Notify on failure
      if: failure()
      run: |
        echo "Movie Heat newsletter generation failed. Check the logs above for details."
        echo "Make sure all required secrets are set in repository settings:"
        echo "  - GMAIL_USER"
        echo "  - GMAIL_APP_PASSWORD"
        echo "  - RECIPIENT_EMAIL"

